<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScandiScout - Universal Flight Router</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-dark: #0f172a; 
            --bg-card: #1e293b; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            --accent-blue: #38bdf8; 
            --accent-green: #10b981;
            --sidebar-width: 280px; 
        }
        
        * { box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 0; display: flex; min-height: 100vh; }
        
        .sidebar { width: var(--sidebar-width); position: fixed; height: 100vh; background: #1e293b; border-right: 1px solid rgba(255, 255, 255, 0.05); padding: 30px 24px; z-index: 1000; }
        .sidebar h2 { color: var(--text-main); font-size: 24px; font-weight: 800; margin-top: 0; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .sidebar h2::before { content: ''; display: inline-block; width: 8px; height: 24px; background: var(--accent-blue); border-radius: 4px; }
        .sidebar a { display: block; color: var(--text-muted); text-decoration: none; padding: 12px 16px; font-weight: 600; font-size: 15px; border-radius: 8px; margin-bottom: 8px; transition: all 0.2s ease; }
        .sidebar a:hover { color: var(--text-main); background: rgba(255, 255, 255, 0.05); }
        
        .main-content { margin-left: var(--sidebar-width); padding: 50px; width: 100%; max-width: 1100px; }
        
        .search-container { background: var(--bg-card); padding: 30px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 40px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 24px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        input, select { background: #141b2e; border: 1px solid rgba(255, 255, 255, 0.1); padding: 14px; border-radius: 8px; color: #ffffff; font-family: inherit; font-size: 15px; width: 100%; transition: border-color 0.2s; }
        input:focus, select:focus { outline: none; border-color: var(--accent-blue); }
        
        .submit-btn { background: var(--accent-blue); color: var(--bg-dark); width: 100%; border: none; padding: 16px; font-size: 15px; font-weight: 700; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .submit-btn:hover { transform: translateY(-1px); background: #ffffff; color: var(--bg-dark); }
        
        .results-section { display: none; margin-top: 20px; animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #flights-list { display: grid; grid-template-columns: 1fr; gap: 16px; }
        .flight-card { background: var(--bg-card); border-left: 5px solid var(--accent-blue); border-radius: 12px; padding: 24px; display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .route-info h4 { margin: 0 0 6px 0; font-size: 18px; font-weight: 800; color: #ffffff; }
        .route-info p { margin: 0 0 4px 0; font-size: 14px; color: var(--text-muted); }
        .engine-tag { font-size: 11px; background: rgba(56, 189, 248, 0.1); padding: 3px 8px; border-radius: 4px; color: var(--accent-blue); font-weight: 600; text-transform: uppercase; }
        
        .right-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 12px; }
        .action-text { font-size: 13px; color: var(--text-muted); font-weight: 600; }
        .book-btn { background: var(--accent-green); color: var(--bg-dark); border: none; padding: 12px 20px; font-size: 14px; font-weight: 700; border-radius: 6px; cursor: pointer; text-decoration: none; display: inline-block; transition: background 0.2s; }
        .book-btn:hover { background: #ffffff; color: var(--bg-dark); }
        
        @media (max-width: 960px) { body { flex-direction: column; } .sidebar { width: 100%; position: relative; height: auto; padding: 20px; } .main-content { margin-left: 0; padding: 30px 20px; } .form-grid { grid-template-columns: 1fr; } .flight-card { flex-direction: column; align-items: flex-start; } .right-meta { width: 100%; align-items: flex-start; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>ScandiScout</h2>
        <a href="index.html">← Back Home</a>
        <a href="denmark/index.html">Denmark Guide</a>
        <a href="norway/index.html">Norway Guide</a>
    </div>

    <div class="main-content">
        <h1>✈️ Global Scandinavian Flight Router Engine</h1>
        <p style="color: var(--text-muted); margin-bottom: 30px;">Type any global departure location to scan all available airlines, comparisons, and paths into the Nordics.</p>

        <div class="search-container">
            <form id="routerForm" onsubmit="calculateRoutes(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="origin">Departure City or Airport</label>
                        <input type="text" id="origin" placeholder="e.g. New York, London, Tokyo, Dubai, Paris" required>
                    </div>
                    <div class="form-group">
                        <label for="destination">Target Nordic Hub</label>
                        <select id="destination" required>
                            <option value="Copenhagen">Copenhagen, Denmark (CPH)</option>
                            <option value="Oslo">Oslo, Norway (OSL)</option>
                            <option value="Stockholm">Stockholm, Sweden (ARN)</option>
                        </select>
                    </div>
                    <div class="form-grid" style="grid-column: span 2; margin: 0; padding: 0;">
                        <div class="form-group">
                            <label for="travelDate">Departure Date</label>
                            <input type="date" id="travelDate" required>
                        </div>
                        <div class="form-group">
                            <label for="cabinClass">Cabin Class</label>
                            <select id="cabinClass">
                                <option value="economy">Economy Standard</option>
                                <option value="premium">Premium Economy</option>
                                <option value="business">Business Class</option>
                                <option value="first">First Class ✨</option>
                            </select>
                        </div>
                    </div>
                </div>
                <button type="submit" class="submit-btn">Compare All Global Airline Options →</button>
            </form>
        </div>

        <div id="results" class="results-section">
            <h3 style="margin-bottom: 20px;">Available Direct Flight Portals Found</h3>
            <div id="flights-list"></div>
        </div>
    </div>

    <script>
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('travelDate').value = tomorrow.toISOString().split('T')[0];

        function calculateRoutes(e) {
            e.preventDefault();
            
            const origin = encodeURIComponent(document.getElementById('origin').value.trim());
            const destination = encodeURIComponent(document.getElementById('destination').value);
            const travelDate = document.getElementById('travelDate').value; 
            const cabin = document.getElementById('cabinClass').value;
            
            // Adjust label strings depending on selected premium cabins
            let cabinLabel = "Economy";
            if (cabin === 'premium') cabinLabel = "Premium Economy";
            if (cabin === 'business') cabinLabel = "Business Class";
            if (cabin === 'first') cabinLabel = "First Class";
            
            const searchEngines = [
                {
                    name: "Google Flights Matrix",
                    description: `Compare all active legacy carriers, Middle Eastern routes, and flag operators options side-by-side in ${cabinLabel}.`,
                    tag: "All Global Airlines",
                    url: `https://www.google.com/travel/flights?q=Flights%20to%20${destination}%20from%20${origin}%20on%20${travelDate}%20one-way`
                },
                {
                    name: "Skyscanner Live Router",
                    description: `Find direct routing schedules, low-cost carrier bundles, and elite connections in ${cabinLabel}.`,
                    tag: "Budget + Premium Search",
                    url: `https://www.skyscanner.com/transport/flights/${origin}/${destination}/${travelDate}/?adults=1&cabinclass=${cabin}&rtn=0`
                },
                {
                    name: "Kayak Global Meta Search",
                    description: `Scans active airline reservation matrix platforms and outputs optimized pricing paths for ${cabinLabel}.`,
                    tag: "Flexible Deal Engine",
                    url: `https://www.kayak.com/flights/${origin}-${destination}/${travelDate}?sort=bestflight_a`
                }
            ];

            const listContainer = document.getElementById('flights-list');
            listContainer.innerHTML = ""; 

            searchEngines.forEach(engine => {
                const cardHTML = `
                    <div class="flight-card">
                        <div class="route-info">
                            <h4 style="display:flex; align-items:center; gap:10px;">
                                ${engine.name} 
                                <span class="engine-tag">${engine.tag}</span>
                            </h4>
                            <p>${decodeURIComponent(origin)} → ${decodeURIComponent(destination)} • Class: ${cabinLabel}</p>
                            <p style="color: var(--text-muted); font-size: 13px; margin-top: 4px;">${engine.description}</p>
                        </div>
                        <div class="right-meta">
                            <span class="action-text">Live Scheduling Links</span>
                            <a href="${engine.url}" target="_blank" rel="noopener noreferrer" class="book-btn">Open Live Results ↗</a>
                        </div>
                    </div>
                `;
                listContainer.innerHTML += cardHTML;
            });

            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>
</html>

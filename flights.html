<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScandiScout - Multi-Airline Global Router</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-dark: #0f172a; 
            --bg-card: #1e293b; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            --accent-blue: #38bdf8; 
            --accent-green: #10b981;
            --sidebar-width: 280px; 
        }
        
        * { box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 0; display: flex; min-height: 100vh; }
        
        .sidebar { width: var(--sidebar-width); position: fixed; height: 100vh; background: #1e293b; border-right: 1px solid rgba(255, 255, 255, 0.05); padding: 30px 24px; z-index: 1000; }
        .sidebar h2 { color: var(--text-main); font-size: 24px; font-weight: 800; margin-top: 0; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .sidebar h2::before { content: ''; display: inline-block; width: 8px; height: 24px; background: var(--accent-blue); border-radius: 4px; }
        .sidebar a { display: block; color: var(--text-muted); text-decoration: none; padding: 12px 16px; font-weight: 600; font-size: 15px; border-radius: 8px; margin-bottom: 8px; transition: all 0.2s ease; }
        .sidebar a:hover { color: var(--text-main); background: rgba(255, 255, 255, 0.05); }
        
        .main-content { margin-left: var(--sidebar-width); padding: 50px; width: 100%; max-width: 1100px; }
        
        .search-container { background: var(--bg-card); padding: 30px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 40px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 24px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        input, select { background: #141b2e; border: 1px solid rgba(255, 255, 255, 0.1); padding: 14px; border-radius: 8px; color: #ffffff; font-family: inherit; font-size: 15px; width: 100%; transition: border-color 0.2s; }
        input:focus, select:focus { outline: none; border-color: var(--accent-blue); }
        
        .submit-btn { background: var(--accent-blue); color: var(--bg-dark); width: 100%; border: none; padding: 16px; font-size: 15px; font-weight: 700; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .submit-btn:hover { transform: translateY(-1px); background: #ffffff; color: var(--bg-dark); }
        
        .results-section { display: none; margin-top: 20px; animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #flights-list { display: flex; flex-direction: column; gap: 16px; }
        .flight-card { background: var(--bg-card); border-left: 5px solid var(--accent-blue); border-radius: 12px; padding: 24px; display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .route-info h4 { margin: 0 0 6px 0; font-size: 18px; font-weight: 800; color: #ffffff; }
        .route-info p { margin: 0 0 4px 0; font-size: 14px; color: var(--text-muted); }
        .route-info .time-slot { font-size: 12px; color: var(--accent-blue); font-weight: 600; }
        .airline-origin { font-size: 11px; background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px; color: #fff; margin-left: 8px; font-weight: 400; }
        
        .right-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 12px; }
        .price-badge { font-size: 20px; font-weight: 800; color: var(--accent-green); background: rgba(16, 185, 129, 0.1); padding: 8px 16px; border-radius: 6px; }
        .book-btn { background: var(--accent-blue); color: var(--bg-dark); border: none; padding: 10px 16px; font-size: 13px; font-weight: 700; border-radius: 6px; cursor: pointer; text-decoration: none; display: inline-block; transition: background 0.2s; }
        .book-btn:hover { background: #ffffff; color: var(--bg-dark); }
        
        @media (max-width: 960px) { body { flex-direction: column; } .sidebar { width: 100%; position: relative; height: auto; padding: 20px; } .main-content { margin-left: 0; padding: 30px 20px; } .form-grid { grid-template-columns: 1fr; } .flight-card { flex-direction: column; align-items: flex-start; } .right-meta { width: 100%; align-items: flex-start; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>ScandiScout</h2>
        <a href="index.html">← Back Home</a>
        <a href="denmark/index.html">Denmark Guide</a>
        <a href="norway/index.html">Norway Guide</a>
    </div>

    <div class="main-content">
        <h1>✈️ Global Multi-Airline Flight Router</h1>
        <p style="color: var(--text-muted); margin-bottom: 30px;">Type any global country or city destination to build routing paths across individual international carrier systems.</p>

        <div class="search-container">
            <form id="routerForm" action="#" onsubmit="calculateRoutes(event); return false;">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="origin">Departure City or Country</label>
                        <input type="text" id="origin" placeholder="e.g. India, Delhi, Mumbai, Dubai, New York" required>
                    </div>
                    <div class="form-group">
                        <label for="destination">Target Nordic Hub</label>
                        <select id="destination" required>
                            <option value="CPH">Copenhagen, Denmark (CPH)</option>
                            <option value="OSL">Oslo, Norway (OSL)</option>
                            <option value="ARN">Stockholm, Sweden (ARN)</option>
                        </select>
                    </div>
                    <div class="form-grid" style="grid-column: span 2; margin: 0; padding: 0;">
                        <div class="form-group">
                            <label for="travelDate">Departure Date</label>
                            <input type="date" id="travelDate" required>
                        </div>
                        <div class="form-group">
                            <label for="cabinClass">Cabin Class</label>
                            <select id="cabinClass">
                                <option value="economy">Economy Standard</option>
                                <option value="premium">Premium Economy</option>
                                <option value="business">Business Class</option>
                                <option value="first">First Class ✨</option>
                            </select>
                        </div>
                    </div>
                </div>
                <button type="submit" class="submit-btn">Search Airline Booking Schedules →</button>
            </form>
        </div>

        <div id="results" class="results-section">
            <h3 style="margin-bottom: 20px;">Available Global Airline Routes Found</h3>
            <div id="flights-list"></div>
        </div>
    </div>

    <script>
        // Force state initialization values
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('travelDate').value = tomorrow.toISOString().split('T')[0];

        function getAirportCode(text) {
            const clean = text.toLowerCase().trim();
            if (clean.length === 3) return clean.toUpperCase();

            const database = {
                "india": "DEL", "delhi": "DEL", "new delhi": "DEL", "mumbai": "BOM", "bombay": "BOM", "bangalore": "BLR",
                "uae": "DXB", "dubai": "DXB", "abu dhabi": "AUH",
                "usa": "JFK", "america": "JFK", "new york": "JFK", "los angeles": "LAX",
                "uk": "LHR", "london": "LHR",
                "france": "CDG", "paris": "CDG",
                "germany": "FRA", "frankfurt": "FRA"
            };
            return database[clean] || "DXB"; 
        }

        function calculateRoutes(e) {
            if (e) {
                e.preventDefault();
                e.stopPropagation();
            }
            
            const rawOrigin = document.getElementById('origin').value;
            const originCode = getAirportCode(rawOrigin);
            const destCode = document.getElementById('destination').value;
            const travelDate = document.getElementById('travelDate').value; 
            const cabin = document.getElementById('cabinClass').value;
            
            let priceMultiplier = 1.0;
            let cabinLabel = "Economy";
            if (cabin === 'premium') { priceMultiplier = 1.6; cabinLabel = "Premium Economy"; }
            if (cabin === 'business') { priceMultiplier = 3.3; cabinLabel = "Business Class"; }
            if (cabin === 'first') { priceMultiplier = 5.5; cabinLabel = "First Class"; }

            // 12 standalone airline systems built dynamically
            const airlines = [
                { name: "Air India", region: "India Gateway", basePrice: 380, time: "11:15 AM", duration: "9h 40m", url: "https://www.airindia.com/" },
                { name: "Emirates", region: "UAE Flag", basePrice: 450, time: "09:15 AM", duration: "7h 10m", url: "https://www.emirates.com/" },
                { name: "Etihad Airways", region: "UAE Carrier", basePrice: 430, time: "10:30 AM", duration: "7h 35m", url: "https://www.etihad.com/" },
                { name: "Delta Air Lines", region: "USA Operator", basePrice: 520, time: "17:40 PM", duration: "8h 15m", url: "https://www.delta.com/" },
                { name: "United Airlines", region: "USA Flag", basePrice: 490, time: "18:25 PM", duration: "8h 30m", url: "https://www.united.com/" },
                { name: "American Airlines", region: "USA Legacy", basePrice: 510, time: "19:10 PM", duration: "8h 50m", url: "https://www.aa.com/" },
                { name: "SAS Scandinavian Airlines", region: "Nordic Flag", basePrice: 140, time: "08:00 AM", duration: "Direct Flight", url: "https://www.flysas.com/" },
                { name: "Finnair", region: "Nordic Premium", basePrice: 180, time: "14:20 PM", duration: "Transit Loop", url: "https://www.finnair.com/" },
                { name: "Lufthansa", region: "Europe Hub", basePrice: 195, time: "07:25 AM", duration: "via Frankfurt", url: "https://www.lufthansa.com/" },
                { name: "British Airways", region: "Europe Flag", basePrice: 210, time: "12:05 PM", duration: "via London LHR", url: "https://www.britishairways.com/" },
                { name: "KLM Royal Dutch", region: "Europe Carrier", basePrice: 175, time: "15:45 PM", duration: "via Amsterdam", url: "https://www.klm.com/" },
                { name: "Air France", region: "Europe Premium", basePrice: 185, time: "16:20 PM", duration: "via Paris CDG", url: "https://www.airfrance.com/" }
            ];

            const listContainer = document.getElementById('flights-list');
            listContainer.innerHTML = ""; 

            airlines.forEach(airline => {
                const finalPrice = Math.round(airline.basePrice * priceMultiplier);
                
                const cardHTML = `
                    <div class="flight-card">
                        <div class="route-info">
                            <h4>${airline.name} <span class="airline-origin">${airline.region}</span></h4>
                            <p>${originCode} → ${destCode} • Seating Class: ${cabinLabel}</p>
                            <span class="time-slot">⏰ Scheduled Departure: ${airline.time} (${airline.duration})</span>
                        </div>
                        <div class="right-meta">
                            <div class="price-badge">€${finalPrice}</div>
                            <a href="${airline.url}" target="_blank" rel="noopener noreferrer" class="book-btn">Book on Official Site ↗</a>
                        </div>
                    </div>
                `;
                listContainer.innerHTML += cardHTML;
            });

            document.getElementById('results').style.display = 'block';
            return false;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScandiScout - Nordic Exploration Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&amp;display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-sidebar: #1e293b;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-green: #10b981;
            --accent-purple: #c084fc;
            --sidebar-width: 280px;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 0; display: flex; min-height: 100vh; }
        
        /* Minimal Sidebar Layout */
        .sidebar { width: var(--sidebar-width); position: fixed; height: 100vh; background: var(--bg-sidebar); border-right: 1px solid rgba(255, 255, 255, 0.05); padding: 40px 24px; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; }
        .sidebar-top h2 { color: var(--text-main); font-size: 24px; font-weight: 800; margin: 0 0 16px 0; display: flex; align-items: center; gap: 10px; }
        .sidebar-top h2::before { content: ''; display: inline-block; width: 6px; height: 24px; background: var(--accent-blue); border-radius: 4px; }
        .sidebar-top p { color: var(--text-muted); font-size: 13px; line-height: 1.6; margin: 0 0 24px 0; }
        
        /* Navigation Sidebar Actions */
        .sidebar-nav { width: 100%; }
        .nav-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: rgba(56, 189, 248, 0.1); color: var(--accent-blue); text-decoration: none; padding: 12px; font-size: 14px; font-weight: 700; border-radius: 8px; border: 1px solid rgba(56, 189, 248, 0.2); transition: all 0.2s; text-align: center; }
        .nav-btn:hover { background: var(--accent-blue); color: var(--bg-dark); transform: translateY(-1px); }

        /* Main Layout Content */
        .main-content { margin-left: var(--sidebar-width); padding: 50px; width: calc(100% - var(--sidebar-width)); max-width: 1200px; }
        
        .header-section { margin-bottom: 36px; }
        .header-section h1 { font-size: 32px; font-weight: 800; margin: 0 0 12px 0; }
        .header-section p { color: var(--text-muted); font-size: 15px; margin: 0; }

        .directories-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }

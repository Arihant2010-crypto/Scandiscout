<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScandiScout - Denmark Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --sidebar-width: 280px;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            display: flex;
            min-height: 100vh;
        }

        .sidebar { 
            width: var(--sidebar-width); 
            position: fixed; 
            height: 100vh; 
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px 24px;
            box-sizing: border-box;
            z-index: 1000; /* Stays above map elements */
        }
        
        .sidebar h2 { color: var(--text-main); font-size: 24px; font-weight: 800; margin-top: 0; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .sidebar h2::before { content: ''; display: inline-block; width: 8px; height: 24px; background: var(--accent-blue); border-radius: 4px; }
        .sidebar a { display: block; color: var(--text-muted); text-decoration: none; padding: 12px 16px; font-weight: 600; font-size: 15px; border-radius: 8px; margin-bottom: 8px; transition: all 0.2s ease; }
        .sidebar a:hover { color: var(--text-main); background: rgba(255, 255, 255, 0.05); }

        .main-content { margin-left: var(--sidebar-width); padding: 50px; width: 100%; max-width: 1100px; box-sizing: border-box; }
        
        /* Modern Map container layout */
        .map-section { margin-bottom: 40px; }
        #map { 
            width: 100%; 
            height: 450px; 
            border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.3);
            z-index: 1;
        }

        /* Custom Popup theme for map */
        .leaflet-popup-content-wrapper { background: var(--bg-card); color: var(--text-main); border-radius: 8px; font-family: 'Plus Jakarta Sans', sans-serif; }
        .leaflet-popup-tip { background: var(--bg-card); }

        .nav-btn { display: inline-block; background-color: var(--accent-blue); color: var(--bg-dark); padding: 12px 24px; text-decoration: none; font-weight: 700; border-radius: 8px; margin-bottom: 30px; transition: transform 0.2s; }
        .nav-btn:hover { transform: translateY(-2px); }
        
        .landmark-card { background: var(--bg-card); padding: 24px; margin-bottom: 20px; border-left: 5px solid var(--accent-blue); border-radius: 8px; }
        .landmark-card h4 { margin-top: 0; margin-bottom: 8px; font-size: 18px; }
        .landmark-card p { color: var(--text-muted); font-size: 14px; margin-bottom: 8px; line-height: 1.5; }

        @media (max-width: 960px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; position: relative; height: auto; padding: 20px; }
            .main-content { margin-left: 0; padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>ScandiScout</h2>
        <a href="../index.html">← Back Home</a>
        <a href="index.html" style="color: var(--accent-blue);">Denmark Guide</a>
